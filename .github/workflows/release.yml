# ============================================================================
# PayIncus 预构建产物包发布工作流
# 在推送版本 tag (v*) 或手动触发时，自动构建前后端并打包为 .tar.gz 发行包
# 支持 amd64 和 arm64 双架构
# ============================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发行版本号（例如 v1.0.0），留空则使用 git SHA 作为预览版'
        required: false
        default: ''

env:
  NODE_VERSION: '22'

jobs:
  # ===== 构建发行包（多架构矩阵） =====
  build:
    name: 构建 (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ===== 安装依赖 =====
      - name: 安装全部依赖
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: 重新构建 esbuild（Vite 构建需要）
        run: pnpm rebuild esbuild

      # ===== 生成 Prisma Client =====
      - name: 生成 Prisma Client
        run: pnpm --filter server exec prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      # ===== 构建前端 =====
      - name: 构建前端 (Vite)
        run: pnpm --filter client build

      - name: 校验前后台构建边界
        run: |
          pnpm --filter server test:frontend-dist-boundary-guards
          pnpm --filter server test:frontend-route-guards

      # ===== 构建后端 =====
      - name: 编译后端 (TypeScript)
        run: pnpm --filter server build

      # ===== 准备发行目录 =====
      - name: 准备发行目录结构
        run: |
          mkdir -p release/client/dist
          mkdir -p release/server
          mkdir -p release/deploy
          mkdir -p release/scripts

          # 复制前端构建产物
          cp -r client/dist/* release/client/dist/

          # 复制后端构建产物
          cp -r server/dist release/server/
          cp -r server/prisma release/server/
          cp server/prisma.config.ts release/server/
          cp server/package.json release/server/
          cp -r server/templates release/server/

          # 复制根配置文件
          cp package.json release/
          cp pnpm-lock.yaml release/
          cp pnpm-workspace.yaml release/
          cp .env.example release/
          cp -r deploy/* release/deploy/
          cp scripts/init-env.sh release/scripts/
          cp scripts/verify-log-header-exposure.sh release/scripts/
          cp scripts/verify-live-acceptance.sh release/scripts/
          cp scripts/verify-production-readiness.sh release/scripts/
          cp scripts/verify-split-host.sh release/scripts/
          cp scripts/apply-online-update.sh release/scripts/
          cp scripts/migrate-ota-atomic-layout.sh release/scripts/

      # ===== 安装生产依赖 =====
      - name: 安装后端生产依赖
        working-directory: release
        run: |
          # 在发行目录中按锁文件只安装后端生产依赖
          pnpm install --prod --frozen-lockfile --ignore-scripts --filter server

          # 在当前架构的 runner 上原生生成 Prisma Client
          DATABASE_URL="postgresql://user:pass@localhost:5432/db" pnpm --filter server exec prisma generate

      # ===== 创建启动辅助脚本 =====
      - name: 创建管理脚本
        run: |
          cat > release/incudal.sh << 'SCRIPT'
          #!/bin/bash
          # PayIncus 快捷管理脚本
          set -e
          APP_DIR="$(cd "$(dirname "$0")" && pwd)"

          case "${1:-}" in
            start)
              echo "🚀 启动 PayIncus..."
              cd "$APP_DIR/server"
              pnpm exec prisma migrate deploy
              cd "$APP_DIR"
              exec node server/dist/app.js
              ;;
            migrate)
              echo "🔄 执行数据库迁移..."
              cd "$APP_DIR/server"
              pnpm exec prisma migrate deploy
              echo "✅ 迁移完成"
              ;;
            version)
              echo "PayIncus $(node -e "console.log(require('./package.json').version)")"
              ;;
            *)
              echo "用法: $0 {start|migrate|version}"
              exit 1
              ;;
          esac
          SCRIPT
          chmod +x release/incudal.sh

      # ===== 确定版本号 =====
      - name: 确定版本号
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="preview-$(echo ${{ github.sha }} | head -c 7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 版本号: $VERSION"

      # ===== 写入版本元数据 =====
      - name: 写入版本元数据
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GIT_TAG=""
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            GIT_TAG="$VERSION"
          fi
          CHANGELOG="$(git tag -l "$VERSION" --format='%(contents)' | sed '/^[[:space:]]*$/d' || true)"
          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="$(git log -1 --pretty=%s)"
          fi
          export CHANGELOG
          node - "$VERSION" "$GIT_TAG" "${{ github.sha }}" <<'NODE'
          const fs = require('fs')
          const [version, gitTag, gitCommit] = process.argv.slice(2)
          const changelog = (process.env.CHANGELOG || '')
            .split(/\r?\n/)
            .map(line => line.replace(/^[-*]\s+/, '').trim())
            .filter(Boolean)
            .slice(0, 50)
          fs.writeFileSync('release/version.json', JSON.stringify({
            version,
            gitTag: gitTag || null,
            gitCommit: gitCommit.slice(0, 12),
            buildTime: new Date().toISOString(),
            deployedAt: null,
            changelog
          }, null, 2) + '\n')
          NODE

      # ===== 打包 =====
      - name: 打包为 tar.gz
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd release
          tar -czf "../incudal-${VERSION}-linux-${{ matrix.arch }}.tar.gz" .
          cd ..
          ls -lh "incudal-${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          echo "📦 发行包大小: $(du -h "incudal-${VERSION}-linux-${{ matrix.arch }}.tar.gz" | cut -f1)"

      # ===== 上传构建产物 =====
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: incudal-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}
          path: incudal-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz
          retention-days: 30

  # ===== 发布 Release（等待所有架构构建完成） =====
  release:
    name: 发布 Release
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定版本号
        id: version
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      # 下载所有架构的构建产物
      - name: 下载 amd64 产物
        uses: actions/download-artifact@v4
        with:
          name: incudal-${{ steps.version.outputs.version }}-linux-amd64

      - name: 下载 arm64 产物
        uses: actions/download-artifact@v4
        with:
          name: incudal-${{ steps.version.outputs.version }}-linux-arm64

      - name: 列出发行文件
        run: ls -lh incudal-*.tar.gz

      - name: 生成 OTA manifest 和校验文件
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          CHANGELOG="$(git tag -l "$VERSION" --format='%(contents)' | sed '/^[[:space:]]*$/d' || true)"
          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="$(git log -1 --pretty=%s)"
          fi

          for file in incudal-"$VERSION"-linux-*.tar.gz; do
            sha256sum "$file" > "$file.sha256"
          done

          export VERSION REPO CHANGELOG
          node <<'NODE'
          const fs = require('fs')
          const crypto = require('crypto')

          const version = process.env.VERSION
          const repo = process.env.REPO
          const changelog = (process.env.CHANGELOG || '')
            .split(/\r?\n/)
            .map(line => line.replace(/^[-*]\s+/, '').trim())
            .filter(Boolean)
            .slice(0, 50)

          const artifacts = fs.readdirSync('.')
            .filter(name => name.startsWith(`incudal-${version}-linux-`) && name.endsWith('.tar.gz'))
            .sort()
            .map(name => {
              const match = name.match(/linux-([^.]+)\.tar\.gz$/)
              const data = fs.readFileSync(name)
              return {
                name,
                platform: 'linux',
                arch: match ? match[1] : 'unknown',
                url: `https://github.com/${repo}/releases/download/${version}/${name}`,
                sha256: crypto.createHash('sha256').update(data).digest('hex'),
                size: data.length
              }
            })

          fs.writeFileSync(`incudal-${version}-ota-manifest.json`, JSON.stringify({
            schemaVersion: 1,
            product: 'payincus',
            version,
            gitTag: version,
            gitCommit: '${{ github.sha }}'.slice(0, 12),
            buildTime: new Date().toISOString(),
            minimumUpdaterVersion: 'v0.0.3',
            changelog,
            artifacts
          }, null, 2) + '\n')
          NODE

          cp "incudal-${VERSION}-ota-manifest.json" ota-manifest.json
          ls -lh incudal-*.tar.gz incudal-*.sha256 *ota-manifest.json

      - name: 生成官方插件市场资产
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          PLUGIN_ID="com.payincus.ai-ticket-agent"
          PLUGIN_SOURCE_DIR="plugin-templates/ai-ticket-agent-plugin"
          PLUGIN_VERSION="$(node -e "console.log(require('./${PLUGIN_SOURCE_DIR}/payincus.plugin.json').version)")"
          PLUGIN_PACKAGE="payincus-plugin-ai-ticket-agent-${PLUGIN_VERSION}.tar.gz"
          PLUGIN_MANIFEST="payincus-plugin-ai-ticket-agent-${PLUGIN_VERSION}.manifest.json"

          tar -czf "${PLUGIN_PACKAGE}" -C "${PLUGIN_SOURCE_DIR}" payincus.plugin.json README.md dist templates docs
          cp "${PLUGIN_SOURCE_DIR}/payincus.plugin.json" "${PLUGIN_MANIFEST}"
          sha256sum "${PLUGIN_PACKAGE}" > "${PLUGIN_PACKAGE}.sha256"

          export VERSION REPO PLUGIN_ID PLUGIN_VERSION PLUGIN_PACKAGE PLUGIN_MANIFEST
          export PLUGIN_SHA256="$(cut -d ' ' -f1 "${PLUGIN_PACKAGE}.sha256")"
          node <<'NODE'
          const fs = require('fs')
          const manifest = JSON.parse(fs.readFileSync(process.env.PLUGIN_MANIFEST, 'utf8'))
          const assetBase = `https://github.com/${process.env.REPO}/releases/download/${process.env.VERSION}`
          const adminPages = (manifest.entrypoints?.adminPages || []).map(page => page.slot).filter(Boolean)
          const userPages = (manifest.entrypoints?.userPages || []).map(page => page.slot).filter(Boolean)
          fs.writeFileSync('plugin-market-index.json', JSON.stringify({
            plugins: [
              {
                id: process.env.PLUGIN_ID,
                name: manifest.name,
                latest: process.env.PLUGIN_VERSION,
                repo: `https://github.com/${process.env.REPO}`,
                manifestUrl: `${assetBase}/${process.env.PLUGIN_MANIFEST}`,
                downloadUrl: `${assetBase}/${process.env.PLUGIN_PACKAGE}`,
                sha256: process.env.PLUGIN_SHA256,
                description: manifest.description,
                author: manifest.author,
                reviewStatus: 'listed',
                trustLevel: 'official',
                developer: {
                  name: 'PayIncus',
                  homepage: 'https://payincus.com',
                  github: `https://github.com/${process.env.REPO}`,
                  verified: true,
                  contact: ''
                },
                permissions: {
                  adminPages,
                  userPages,
                  api: manifest.permissions || [],
                  storage: ['plugin:config']
                },
                compatibility: {
                  minPayincus: manifest.payincus?.minVersion || 'v0.4.0',
                  maxPayincus: manifest.payincus?.maxVersion || null
                },
                security: {
                  checksumPinned: true,
                  signature: { status: 'unsigned' },
                  notes: ['GitHub Release artifact with SHA256 verification']
                },
                pricing: {
                  type: 'free',
                  price: null,
                  currency: null,
                  revenueSharePercent: null
                },
                rating: { average: 5, count: 1 },
                installCount: 0,
                releaseNotes: '官方 AI 工单助手插件，支持工单草稿生成和受控接管回复。',
                upgradeNotes: '从插件中心市场页安装新版本，安装前会校验 GitHub Release 包和 SHA256。',
                rollbackNotes: '如需回退，请在插件中心卸载后安装上一版插件包。'
              }
            ]
          }, null, 2) + '\n')
          NODE

          ls -lh payincus-plugin-* plugin-market-index.json

      # 创建 Release 并上传所有架构的产物
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            incudal-*.tar.gz
            incudal-*.tar.gz.sha256
            incudal-*-ota-manifest.json
            ota-manifest.json
            payincus-plugin-*.tar.gz
            payincus-plugin-*.tar.gz.sha256
            payincus-plugin-*.manifest.json
            plugin-market-index.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
