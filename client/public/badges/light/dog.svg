<filter id="glow-neon-l" x="-50%" y="-50%" width="200%" height="200%">
  <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2" result="shadow"></feDropShadow>
  <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="glow"></feGaussianBlur>
  <feMerge>
    <feMergeNode in="shadow"></feMergeNode>
    <feMergeNode in="glow"></feMergeNode>
    <feMergeNode in="SourceGraphic"></feMergeNode>
  </feMerge>
</filter>
<filter id="glow-intense-l" x="-50%" y="-50%" width="200%" height="200%">
  <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.25" result="shadow"></feDropShadow>
  <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b1"></feGaussianBlur>
  <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="b2"></feGaussianBlur>
  <feMerge>
    <feMergeNode in="shadow"></feMergeNode>
    <feMergeNode in="b1"></feMergeNode>
    <feMergeNode in="b2"></feMergeNode>
    <feMergeNode in="SourceGraphic"></feMergeNode>
  </feMerge>
</filter><linearGradient id="bg-supreme-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2a2d3e"></stop><stop offset="100%" stop-color="#0a0a0f"></stop></linearGradient><linearGradient id="bg-supreme-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"></stop><stop offset="100%" stop-color="#cbd5e1"></stop></linearGradient><linearGradient id="bg-void-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a0033"></stop><stop offset="50%" stop-color="#05000a"></stop><stop offset="100%" stop-color="#000000"></stop></linearGradient><linearGradient id="bg-void-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#312e81"></stop><stop offset="50%" stop-color="#0f172a"></stop><stop offset="100%" stop-color="#020617"></stop></linearGradient><linearGradient id="bg-ice-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#002244"></stop><stop offset="100%" stop-color="#000a1a"></stop></linearGradient><linearGradient id="bg-ice-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e0f2fe"></stop><stop offset="100%" stop-color="#7dd3fc"></stop></linearGradient><linearGradient id="bg-gold-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4a3b1c"></stop><stop offset="100%" stop-color="#1a140a"></stop></linearGradient><linearGradient id="bg-gold-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fef3c7"></stop><stop offset="100%" stop-color="#fbbf24"></stop></linearGradient><linearGradient id="bg-moon-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#334155"></stop><stop offset="100%" stop-color="#0f172a"></stop></linearGradient><linearGradient id="bg-moon-l" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f8fafc"></stop><stop offset="100%" stop-color="#94a3b8"></stop></linearGradient><linearGradient id="bg-omega-d" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4a0000"></stop